services:
  app:
    image: ghcr.io/cangerx/c-aihuabu:latest
    container_name: infinite-canvas
    ports:
      - "3000:3000"
    environment:
      C_AI_PUBLIC_BASE_URL: ""
      # 参考图片上传后返回给视频上游的公网地址；上游通常要求 https://
    volumes:
      - ./data/uploads:/app/web/data/uploads
    restart: unless-stopped
